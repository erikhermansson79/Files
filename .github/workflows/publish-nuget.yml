name: Publish NuGet Package

on:
  push:
    branches: [ master ]
    paths:
      - 'Files.Api/**'
      - '.github/workflows/publish-nuget.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build Files.Api/Files.Api.csproj -c Release
      - name: Push to GitHub Packages
        env:
          NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push Files.Api/bin/Release/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate --no-symbols
