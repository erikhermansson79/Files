name: Publish NuGet Package

on:
  push:
    branches: [ main ]
    paths:
      - 'src/Files.Api/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore src/Files.Api/Files.Api.sln
      - name: Build
        run: dotnet build src/Files.Api/Files.Api.sln -c Release --no-restore
      - name: Pack
        run: dotnet pack src/Files.Api/Files.Api.csproj -c Release -o ./artifacts
      - name: Push to GitHub Packages
        env:
          NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
