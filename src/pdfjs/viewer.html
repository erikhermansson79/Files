<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Viewer</title>
    <link rel="stylesheet" href="./pdf_viewer.css" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: #6c757d;
            overflow: hidden;
        }

        #viewerContainer {
            position: absolute;
            inset: 0;
            overflow: auto;
            padding: 1rem;
            box-sizing: border-box;
        }

        #viewer {
            margin: 0 auto;
        }

        #error {
            display: none;
            margin: 1rem;
            padding: 0.75rem 1rem;
            background: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
            border-radius: 0.375rem;
            font-family: sans-serif;
        }
    </style>
    <script type="module" src="./viewer.mjs"></script>
</head>
<body>
    <div id="error"></div>
    <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
    </div>
</body>
</html>
